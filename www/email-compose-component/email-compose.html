<div class="email-compose-overlay" id="composeOverlay">
    <div class="email-compose-modal" id="composeModal">
        <div class="email-compose-header" id="composeModalHeader">
            <h3 class="email-compose-title" data-i18n="emailCompose.title">Compose Email</h3>
            <div class="email-compose-actions">
                <button id="composeCloseBtn" class="email-compose-close-btn" data-i18n-title="common.close" title="Close">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>

        <div class="email-compose-content">
            <div class="email-compose-form">
                <div class="email-compose-form-field">
                    <label class="email-compose-field-label" data-i18n="emailCompose.toLabel">To:</label>
                    <div class="email-compose-chips-field" id="toChipsField">
                        <input id="toChipsInput" type="text" class="email-compose-chips-input" data-i18n-placeholder="emailCompose.toPlaceholder" placeholder="Enter email addresses, separated by comma, Tab, or Enter" autocomplete="off" />
                        <div class="email-compose-chips-suggestions" id="toChipsSuggestions" hidden></div>
                    </div>
                </div>

                <div class="email-compose-form-field">
                    <label class="email-compose-field-label" data-i18n="emailCompose.subjectLabel">Subject:</label>
                    <input type="text" id="composeSubjectField" class="email-compose-field-input">
                </div>

                <div class="email-compose-attachments-section">
                    <div class="email-compose-attachments-header">
                        <button id="addAttachmentBtn" class="email-compose-attachment-btn" type="button">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                            </svg>
                            <span data-i18n="emailCompose.addAttachment">Add Attachment</span>
                        </button>
                        <input type="file" id="attachmentInput" class="email-compose-attachment-input" multiple style="display: none;">
                    </div>
                    <div id="attachmentsList" class="email-compose-attachments-list"></div>
                </div>

                <div class="email-compose-editor-container" id="dropZone">
                    <textarea id="tinymceEditor" class="email-compose-tinymce-editor"></textarea>
                </div>

                <!-- Drag-and-drop file floating layer -->
                <div class="email-compose-drop-overlay" id="dropOverlay">
                    <!-- Top section: insert into rich text editor -->
                    <div class="email-compose-drop-section email-compose-drop-section-top" id="dropSectionEditor">
                        <div class="email-compose-drop-section-content">
                            <div class="email-compose-drop-icon">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                    <polyline points="21 15 16 10 5 21"></polyline>
                                </svg>
                            </div>
                            <div class="email-compose-drop-text" data-i18n="emailCompose.dropToEditor">Insert into email body</div>
                            <div class="email-compose-drop-subtext" data-i18n="emailCompose.dropToEditorSub">Release to insert image into editor</div>
                        </div>
                    </div>
                    <!-- Bottom section: add to attachments -->
                    <div class="email-compose-drop-section email-compose-drop-section-bottom" id="dropSectionAttachment">
                        <div class="email-compose-drop-section-content">
                            <div class="email-compose-drop-icon">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                                </svg>
                            </div>
                            <div class="email-compose-drop-text" data-i18n="emailCompose.dropToAttachment">Add to attachments</div>
                            <div class="email-compose-drop-subtext" data-i18n="emailCompose.dropToAttachmentSub">Release to upload as attachment</div>
                        </div>
                    </div>
                </div>

                <div class="email-compose-original-section" id="originalEmailSection">
                    <div class="email-compose-original-header" data-i18n="emailCompose.originalEmailHeader">--- Original Email ---</div>
                    <div class="email-compose-original-info">
                        <div class="email-compose-original-item">
                            <span class="email-compose-original-label" data-i18n="emailCompose.originalFrom">From:</span>
                            <span id="originalFrom"></span>
                        </div>
                        <div class="email-compose-original-item">
                            <span class="email-compose-original-label" data-i18n="emailCompose.originalTime">Time:</span>
                            <span id="originalDate"></span>
                        </div>
                    </div>
                    <div class="email-compose-original-content" id="originalContent"></div>
                </div>
            </div>
        </div>

        <div class="email-compose-footer">
            <div class="email-compose-footer-from">
                <label class="email-compose-footer-label" data-i18n="emailCompose.fromLabel">From:</label>
                <input type="text" id="fromFieldReadonly" class="email-compose-footer-input" readonly data-i18n-placeholder="emailCompose.fromPlaceholder" placeholder="No account selected" />
            </div>
            <div class="email-compose-footer-actions">
                <button id="sendComposeBtn" class="email-compose-send-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                    <span data-i18n="common.send">Send</span>
                </button>
                <button id="cancelComposeBtn" class="email-compose-cancel-btn" data-i18n="common.cancel">Cancel</button>
            </div>
        </div>
        </div>
    </div>
</div>
